services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health

databases:
  - name: inventory-db
    plan: free
